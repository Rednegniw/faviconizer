<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="google-adsense-account" content="ca-pub-9925053975434206" />
		<script>
			// Immediately invoked function to set the theme before content loads
			(function () {
				const theme =
					document.cookie
						.split('; ')
						.find((row) => row.startsWith('theme='))
						?.split('=')[1] || 'light';
				document.documentElement.classList.add(theme);
			})();
		</script>
		<script defer src="https://assets.onedollarstats.com/stonks.js"></script>
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="min-h-screen bg-background transition-colors duration-150"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
